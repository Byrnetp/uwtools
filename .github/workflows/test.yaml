name: Test
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - ci-testing
  workflow_dispatch:
    branches:
      - '**'
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install conda
        run: .github/scripts/install-conda.sh
      - name: Test Notebooks
        run: .github/scripts/test-nb.sh
